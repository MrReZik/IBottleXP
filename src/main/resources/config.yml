# Настройки бутылочек
# Каждая бутылочка - это отдельный предмет с уникальными свойствами
bottles:

  bottle1:
    # Отображаемое имя предмета (поддерживает &#rrggbb и &коды)
    name: "&#00FF00Топ бутылочка"
    # Количество уровней опыта за одно использование
    levels: 50
    # Описание предмета (список строк, поддерживает &#rrggbb и &коды)
    lore:
      - "&#aaaaaa━━━━━━━━━━━━━━━━━━━━"
      - "&#FFFFFFДает &a50 &fуровней опыта"
      - "&#FFD700✦ &eРедкая бутылочка &FFD700✦"
      - "&#aaaaaa━━━━━━━━━━━━━━━━━━━━"
    # Звук при использовании (из org.bukkit.Sound)
    sound: ENTITY_EXPERIENCE_ORB_PICKUP
    # Громкость звука (0.0 - 2.0)
    sound-volume: 1.0
    # Тон звука (0.5 - 2.0)
    sound-pitch: 1.0
    # Кулдаун в секундах (0 = без кулдауна)
    cooldown: 5
    # Сообщение в action bar при использовании (поддерживает &#rrggbb)
    action-bar: "&#00FF00+50 уровней опыта!"

  bottle2:
    name: "&#AAFFAA Обычная бутылочка"
    levels: 10
    lore:
      - "&#aaaaaa━━━━━━━━━━━━━━━━━━━━"
      - "&#FFFFFFДает &a10 &fуровней опыта"
      - "&#aaaaaa━━━━━━━━━━━━━━━━━━━━"
    sound: ENTITY_EXPERIENCE_ORB_PICKUP
    sound-volume: 1.0
    sound-pitch: 1.2
    cooldown: 2
    action-bar: "&#AAFFAA+10 уровней опыта!"

  bottle3:
    name: "&#FF4444Легендарная бутылочка"
    levels: 100
    lore:
      - "&#aaaaaa━━━━━━━━━━━━━━━━━━━━"
      - "&#FFFFFFДает &#FF4444100 &fуровней опыта"
      - "&#FF6600⚡ &6Легендарная сила! &#FF6600⚡"
      - "&#aaaaaa━━━━━━━━━━━━━━━━━━━━"
    sound: UI_TOAST_CHALLENGE_COMPLETE
    sound-volume: 1.0
    sound-pitch: 1.0
    cooldown: 30
    action-bar: "&#FF4444⚡ +100 уровней опыта! ⚡"

# Настройки частиц (эффекты при использовании бутылочки)
particles:
  enabled: true
  type: EXP_BOTTLE
  count: 30

# Настройки глобального кулдауна (применяется дополнительно к кулдауну бутылочки)
global-cooldown:
  enabled: false
  seconds: 1

# Включить ли AntiCheat-защиту (логировать подозрительное использование)
anti-abuse:
  enabled: true
  log-to-console: true
  # Максимальное количество бутылочек в секунду перед предупреждением
  max-per-second: 3

# Включить ли статистику (сколько XP получил каждый игрок)
statistics:
  enabled: true
